function getSuggestions(shot, bean){
  const sg=[];const neg=shot.flavors?.negative||[];const pos=shot.flavors?.positive||[];
  const hasAcid=neg.includes("Agrio")||neg.includes("Vegetal");
  const hasBitter=neg.includes("Amargo")||neg.includes("Quemado")||neg.includes("Ceniza");
  const hasDry=neg.includes("Seco")||neg.includes("Astringente");
  const hasFlat=neg.includes("Plano")||neg.includes("Acuoso");
  const hasBoth=hasAcid&&hasBitter;

  /* --- COMPARE WITH PREVIOUS SHOT --- */
  const shots=bean?.shots||[];
  const idx=shots.findIndex(s=>s.id===shot.id);
  const prev=idx>0?shots[idx-1]:(shots.length>1?shots[shots.length-2]:null);

  if(prev){
    const changes=[];
    const dDoseIn=shot.doseIn-prev.doseIn;
    const dDoseOut=shot.doseOut-prev.doseOut;
    const dTemp=shot.temp-prev.temp;
    const dTime=shot.time-prev.time;
    const dGrind=(shot.grindSetting||0)-(prev.grindSetting||0);
    const dPI=(shot.preInfusion||0)-(prev.preInfusion||0);
    const dRatio=(shot.doseOut/shot.doseIn)-(prev.doseOut/prev.doseIn);

    if(Math.abs(dDoseIn)>=0.5) changes.push({param:"dosis de entrada",delta:dDoseIn,unit:"g",abs:Math.abs(dDoseIn)/0.5,dir:dDoseIn>0?"subiste":"bajaste",val:`${prev.doseIn}g → ${shot.doseIn}g`});
    if(Math.abs(dDoseOut)>=1) changes.push({param:"yield (salida)",delta:dDoseOut,unit:"g",abs:Math.abs(dDoseOut)/1,dir:dDoseOut>0?"subiste":"bajaste",val:`${prev.doseOut}g → ${shot.doseOut}g`});
    if(Math.abs(dTemp)>=0.5) changes.push({param:"temperatura",delta:dTemp,unit:"°C",abs:Math.abs(dTemp)/0.5,dir:dTemp>0?"subiste":"bajaste",val:`${prev.temp}°C → ${shot.temp}°C`});
    if(Math.abs(dTime)>=2) changes.push({param:"tiempo de extracción",delta:dTime,unit:"s",abs:Math.abs(dTime)/2,dir:dTime>0?"subió":"bajó",val:`${prev.time}s → ${shot.time}s`});
    if(Math.abs(dGrind)>=0.2) changes.push({param:"molienda (Mythos)",delta:dGrind,unit:"",abs:Math.abs(dGrind)/0.2,dir:dGrind>0?"abriste (más grueso)":"cerraste (más fino)",val:`${prev.grindSetting||0} → ${shot.grindSetting||0}`});
    if(Math.abs(dPI)>=1) changes.push({param:"preinfusión",delta:dPI,unit:"s",abs:Math.abs(dPI)/1,dir:dPI>0?"aumentaste":"redujiste",val:`${prev.preInfusion||0}s → ${shot.preInfusion||0}s`});

    changes.sort((a,b)=>b.abs-a.abs);

    if(changes.length>0){
      const top=changes[0];
      sg.push({icon:"🔄",text:`Cambio principal vs shot anterior: ${top.dir} ${top.param} (${top.val}).`,detail:true});

      if(top.param==="dosis de entrada"){
        if(top.delta>0&&hasAcid) sg.push({icon:"⚠️",text:`Subir la dosis de ${prev.doseIn}g a ${shot.doseIn}g (+${fmt(top.delta)}g) sin ajustar molienda aumenta la resistencia del puck. El agua no logra extraer uniformemente → acidez. Abre molienda para compensar el aumento de dosis, o vuelve a ${prev.doseIn}g y ajusta otra variable.`});
        else if(top.delta>0&&hasBitter) sg.push({icon:"⚠️",text:`Más dosis (${prev.doseIn}g → ${shot.doseIn}g) con la misma molienda genera un puck más denso. Si el tiempo subió mucho, estás sobreextrayendo. Abre molienda proporcionalmente o reduce la dosis.`});
        else if(top.delta>0&&hasBoth) sg.push({icon:"⚠️",text:`El salto de ${prev.doseIn}g a ${shot.doseIn}g es significativo. Un puck mucho más denso con la misma molienda genera canalización: acidez y amargor al mismo tiempo. Vuelve a la dosis anterior o recalibra molienda desde cero.`});
        else if(top.delta<0&&hasFlat) sg.push({icon:"💡",text:`Reducir la dosis de ${prev.doseIn}g a ${shot.doseIn}g puede generar un shot acuoso si el yield se mantuvo igual. El ratio subió a 1:${fmt(shot.doseOut/shot.doseIn)}. Baja el yield proporcionalmente o sube la dosis.`});
        else if(top.delta>0) sg.push({icon:"📝",text:`Subiste la dosis ${fmt(top.delta)}g. Recuerda que cambios mayores a 1g en dosis requieren recalibrar molienda — no es solo más café, es un puck completamente diferente.`});
        else sg.push({icon:"📝",text:`Bajaste la dosis ${fmt(Math.abs(top.delta))}g. Ajusta yield y molienda proporcionalmente para mantener el perfil.`});
      }
      else if(top.param==="temperatura"){
        if(top.delta>0&&hasBitter) sg.push({icon:"🌡️",text:`Subir de ${prev.temp}°C a ${shot.temp}°C probablemente empujó a sobreextracción. Regresa a ${prev.temp}°C o baja 0.5°C desde ahí. La temperatura es la variable más agresiva — mueve de medio grado en medio grado.`});
        else if(top.delta<0&&hasAcid) sg.push({icon:"🌡️",text:`Bajar de ${prev.temp}°C a ${shot.temp}°C redujo la capacidad de extracción. El café no desarrolla bien sus azúcares a esta temperatura. Sube de vuelta a ${prev.temp}°C.`});
        else if(top.delta>0&&hasAcid) sg.push({icon:"🌡️",text:`Subiste temp pero sigue ácido. El problema probablemente no es temperatura sino molienda o distribución. Revisa puck prep antes de seguir subiendo — a ${shot.temp}°C ya deberías tener suficiente extracción.`});
        else sg.push({icon:"📝",text:`Ajuste de temperatura (${top.val}). Si mejoró, documenta. Si no, revisa si el cambio significativo no es otro parámetro que también moviste.`});
      }
      else if(top.param==="molienda (Mythos)"){
        if(top.delta<0&&hasBitter) sg.push({icon:"⚙️",text:`Cerraste molienda (${top.val}) y apareció amargor. El puck está demasiado fino — el agua sobreextrae. Regresa al punto anterior (${prev.grindSetting}) o abre un poco más (+0.2).`});
        else if(top.delta>0&&hasAcid) sg.push({icon:"⚙️",text:`Abriste molienda (${top.val}) y apareció acidez. Fuiste demasiado lejos — el agua pasa rápido sin extraer bien. Cierra ligeramente (-0.2 desde ${shot.grindSetting}).`});
        else sg.push({icon:"📝",text:`Ajuste de molienda (${top.val}). El Mythos es sensible — cambios de 0.2-0.3 son suficientes para notar diferencia.`});
      }
      else if(top.param==="preinfusión"){
        sg.push({icon:"💧",text:`Cambiaste preinfusión (${top.val}). La preinfusión mejora uniformidad de extracción pero no compensa problemas de dosis, molienda o temperatura. Si cambiaste otros parámetros al mismo tiempo, enfócate primero en esos.`});
      }
      else if(top.param==="yield (salida)"){
        if(top.delta>0&&hasBitter) sg.push({icon:"📐",text:`Más yield (${top.val}) puede sobreextraer al final del shot. Los últimos mililitros traen compuestos amargos. Reduce a ${prev.doseOut}g o busca el punto medio.`});
        else if(top.delta<0&&hasAcid) sg.push({icon:"📐",text:`Menos yield (${top.val}) = menos extracción total. Los azúcares no se disolvieron completamente. Sube de vuelta a ${prev.doseOut}g.`});
        else sg.push({icon:"📝",text:`Ajuste de yield (${top.val}). Ratio actual: 1:${fmt(shot.doseOut/shot.doseIn)}.`});
      }

      if(changes.length>1){
        const others=changes.slice(1).map(c=>`${c.param} (${c.val})`).join(", ");
        sg.push({icon:"📋",text:`También cambiaste: ${others}. Para aislar qué causó el resultado, cambia solo una variable a la vez.`});
      }
    }
  }

  /* --- GENERIC FLAVOR-BASED (when no previous shot or no changes) --- */
  if(sg.length===0){
    if(hasBoth){
      sg.push({icon:"⚠️",text:"Acidez + amargor simultáneos = extracción despareja (canalización). El agua encuentra caminos fáciles en el puck: unas zonas se sobreextraen (amargor) mientras otras quedan subextraídas (acidez agria)."});
      sg.push({icon:"🔧",text:"Revisa tu puck prep: distribución con WDT, tamp nivelado con spring tamper. Si ya lo haces, alarga preinfusión a 4-5s con 3-4s de pausa para saturar el puck antes de la presión completa."});
    }else if(hasAcid){
      sg.push({icon:"🌡️",text:`Subextracción: el agua no está sacando suficientes solubles. Los azúcares quedan en el puck y la taza muestra solo ácidos sin contrapeso.`});
      if(shot.temp<93) sg.push({icon:"🔥",text:`Temperatura: sube 1°C (a ${shot.temp+1}°C). Es el ajuste con mayor impacto. Más temperatura = más energía para disolver azúcares.`});
      if(shot.time<28) sg.push({icon:"⚙️",text:`Tiempo muy corto (${shot.time}s). Aprieta molienda en el Mythos (-0.3 a -0.5) para llegar a 28-32s.`});
      if(shot.doseOut/shot.doseIn<1.9) sg.push({icon:"📐",text:`Ratio bajo (1:${fmt(shot.doseOut/shot.doseIn)}). Sube yield a ~${fmt(shot.doseIn*2)}g para ratio 1:2.`});
    }else if(hasBitter||hasDry){
      sg.push({icon:"🌡️",text:`Sobreextracción: estás sacando compuestos indeseables del café. ${hasDry?"La astringencia/sequedad indica que los taninos se están disolviendo.":"El amargor viene de compuestos que se extraen al final."}`});
      if(shot.temp>92) sg.push({icon:"❄️",text:`Baja temperatura 1°C (a ${shot.temp-1}°C). Menos energía = menos extracción de compuestos amargos.`});
      if(shot.time>32) sg.push({icon:"⚙️",text:`Tiempo largo (${shot.time}s). Abre molienda en el Mythos (+0.3) para bajar a 28-32s.`});
    }else if(hasFlat){
      sg.push({icon:"💧",text:"Shot plano/acuoso: falta cuerpo y carácter. El café tiene los solubles pero están muy diluidos o la extracción no llegó a los compuestos de sabor."});
      sg.push({icon:"⚙️",text:`Aprieta molienda ligeramente (Mythos: -0.2 a -0.3). También puedes reducir yield 1-2g para concentrar.`});
    }
    if(pos.includes("Balanceado")&&pos.includes("Dulce")){
      sg.push({icon:"✅",text:`¡Receta lograda! Documenta: ${shot.doseIn}g → ${shot.doseOut}g, ${shot.temp}°C, ${shot.time}s${shot.grindSetting?", M:"+shot.grindSetting:""}${shot.preInfusion?", PI:"+shot.preInfusion+"/"+shot.preInfusionPause+"s":""}. Replica exactamente en los siguientes shots.`});
    }
    if(sg.length===0) sg.push({icon:"📝",text:"Sin problemas claros detectados. Si buscas mejorar, cambia una sola variable a la vez y compara con este shot como referencia."});
  }

  return sg;
}

function genReport(bean){
  const shots=bean.shots||[];if(!shots.length)return null;
  const avg=k=>shots.reduce((a,sh)=>a+(sh[k]||0),0)/shots.length;
  const best=shots.reduce((b,sh)=>(sh.rating||0)>(b.rating||0)?sh:b,shots[0]);
  const freq=type=>{const f={};shots.flatMap(sh=>sh.flavors?.[type]||[]).forEach(n=>f[n]=(f[n]||0)+1);return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,5);};
  return{avgTemp:avg("temp"),avgDoseIn:avg("doseIn"),avgDoseOut:avg("doseOut"),avgTime:avg("time"),avgRating:avg("rating"),avgGrind:avg("grindSetting"),bestShot:best,topNeg:freq("negative"),topPos:freq("positive"),totalShots:shots.length};
}

/* HALF-STAR RATING: supports 0.5 increments */
const Stars=({value,onChange,sz=26})=>{
  const handleClick=(starN,e)=>{
    if(!onChange)return;
    const rect=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const half=x<rect.width/2;
    onChange(half?starN-0.5:starN);
  };
  const renderStar=(n)=>{
    const full=value>=n;
    const halfStar=!full&&value>=n-0.5;
    if(full)return <span key={n} onClick={e=>handleClick(n,e)} style={{fontSize:sz,cursor:onChange?"pointer":"default",color:"#EF9F27",userSelect:"none"}}>★</span>;
    if(halfStar)return <span key={n} onClick={e=>handleClick(n,e)} style={{fontSize:sz,cursor:onChange?"pointer":"default",position:"relative",userSelect:"none",color:B.olivo}}>★<span style={{position:"absolute",left:0,top:0,width:"50%",overflow:"hidden",color:"#EF9F27"}}>★</span></span>;
    return <span key={n} onClick={e=>handleClick(n,e)} style={{fontSize:sz,cursor:onChange?"pointer":"default",color:B.olivo,userSelect:"none"}}>★</span>;
  };
  return <div style={{display:"flex",gap:4,justifyContent:"center",margin:"8px 0"}}>{[1,2,3,4,5].map(renderStar)}</div>;
};

function App(){

  const[selShot,setSelShot]=useState(null);
  const[loaded,setLoaded]=useState(false);
  useEffect(()=>{let cancelled=false;(async()=>{try{if(window.storage){const r=await window.storage.get(SK);if(!cancelled&&r&&r.value){setBeans(JSON.parse(r.value));setLoaded(true);return;}}}catch(e){}if(!cancelled){setBeans(loadData());setLoaded(true);}})();return()=>{cancelled=true};},[]);
  const save=useCallback(nb=>{setBeans(nb);persist(nb);},[]);
  const nav=(scr,bean)=>{setScreen(scr);if(bean)setSelBean(bean);};
  const addBean=b=>{const nb=[...beans,{...b,id:uid(),shots:[],status:"active",createdAt:new Date().toISOString()}];save(nb);setScreen("home");};
  const addShot=(bid,shot)=>{const nb=beans.map(b=>b.id===bid?{...b,shots:[...b.shots,{...shot,id:uid(),timestamp:new Date().toISOString()}]}:b);save(nb);setSelBean(nb.find(b=>b.id===bid));setSelShot(shot);setScreen("shotResult");};
  const closeBean=bid=>{const nb=beans.map(b=>b.id===bid?{...b,status:"closed"}:b);save(nb);setSelBean(nb.find(b=>b.id===bid));setScreen("report");};
  const deleteBean=bid=>{save(beans.filter(b=>b.id!==bid));setScreen("home");setSelBean(null);};
  const[editShot,setEditShot]=useState(null);
  const deleteShot=(bid,sid)=>{const nb=beans.map(b=>b.id===bid?{...b,shots:b.shots.filter(sh=>sh.id!==sid)}:b);save(nb);setSelBean(nb.find(b=>b.id===bid));};
  const updateShot=(bid,updated)=>{const nb=beans.map(b=>b.id===bid?{...b,shots:b.shots.map(sh=>sh.id===updated.id?{...updated,timestamp:sh.timestamp}:sh)}:b);save(nb);setSelBean(nb.find(b=>b.id===bid));setEditShot(null);setScreen("beanDetail");};
  const startEdit=(bean,shot)=>{setSelBean(bean);setEditShot(shot);setScreen("editShot");};
  if(!loaded)return<div style={{...st.app,display:"flex",alignItems:"center",justifyContent:"center"}}><img src={EMB} alt="" style={{width:48,opacity:.3,animation:"pulse 1.5s infinite"}}/></div>;
  return(
    <div style={st.app}>
      {screen==="home"&&<Home beans={beans} nav={nav}/>}
      {screen==="addBean"&&<AddBean onSave={addBean} onBack={()=>setScreen("home")}/>}
      {screen==="beanDetail"&&selBean&&<BeanDetail bean={selBean} nav={nav} onClose={closeBean} onDelete={deleteBean} onDeleteShot={deleteShot} onEdit={sh=>startEdit(selBean,sh)}/>}
      {screen==="logShot"&&selBean&&<LogShot bean={selBean} onSave={sh=>addShot(selBean.id,sh)} onBack={()=>nav("beanDetail",selBean)}/>}
      {screen==="editShot"&&selBean&&editShot&&<LogShot bean={selBean} editShot={editShot} onSave={sh=>updateShot(selBean.id,sh)} onBack={()=>{setEditShot(null);nav("beanDetail",selBean);}}/>}
      {screen==="shotResult"&&selBean&&selShot&&<ShotResult bean={selBean} shot={selShot} onBack={()=>nav("beanDetail",selBean)}/>}
      {screen==="report"&&selBean&&<Report bean={selBean} onBack={()=>nav("beanDetail",selBean)}/>}
      {screen==="archive"&&<Archive beans={beans} nav={nav}/>}
      <nav style={st.nav}>
        <button style={st.navItem} onClick={()=>setScreen("home")}><img src={EMB} alt="" style={{height:22,opacity:screen==="home"?1:.4,filter:screen==="home"?"none":"grayscale(1)"}}/><span style={{...st.navLab,color:screen==="home"?B.rojo:B.gris}}>Granos</span></button>
        <button style={st.navItem} onClick={()=>setScreen("addBean")}><div style={{background:B.rojo,borderRadius:"50%",width:46,height:46,display:"flex",alignItems:"center",justifyContent:"center",marginTop:-16}}><Ic name="plus" sz={22} c="#fff"/></div></button>
        <button style={st.navItem} onClick={()=>setScreen("archive")}><Ic name="archive" sz={22} c={screen==="archive"?B.rojo:B.gris}/><span style={{...st.navLab,color:screen==="archive"?B.rojo:B.gris}}>Archivo</span></button>
      </nav>
    </div>
  );
}

function Home({beans,nav}){
  const active=beans.filter(b=>b.status==="active");
  return(<>
    <Hdr title="LOU" sub="Brew Calibration"/>
    <div style={st.body}>
      <div style={{padding:"16px 0 10px"}}><span style={{...st.label,fontSize:11}}>Granos activos ({active.length})</span></div>
      {!active.length?<div style={st.empty}><img src={EMB} alt="" style={{width:48,opacity:.2}}/><p style={{marginTop:16,fontSize:13}}>No hay granos activos</p><p style={{fontSize:11,color:B.gris}}>Agrega un grano para calibrar</p></div>
      :active.map(b=>(

/* FIXED: functional setState prevents stale closure — inputs keep focus */
function LogShot({bean,onSave,onBack,editShot}){
  const isEdit=!!editShot;
  const[step,setStep]=useState(1);
  const lastShot=editShot||(bean.shots.length?bean.shots[bean.shots.length-1]:null);
  const[f,setF]=useState({doseIn:lastShot?.doseIn||17,doseOut:lastShot?.doseOut||35,temp:lastShot?.temp||93,time:lastShot?.time||30,preInfusion:lastShot?.preInfusion||0,preInfusionPause:lastShot?.preInfusionPause||0,grindSetting:lastShot?.grindSetting||0,notes:lastShot?.notes||"",rating:lastShot?.rating||3,flavors:{negative:lastShot?.flavors?.negative||[],positive:lastShot?.flavors?.positive||[]},...(isEdit?{id:editShot.id}:{})});
  const set=(k,v)=>setF(prev=>({...prev,[k]:v}));
  const toggleF=(t,fl)=>setF(prev=>{const arr=prev.flavors[t];return{...prev,flavors:{...prev.flavors,[t]:arr.includes(fl)?arr.filter(x=>x!==fl):[...arr,fl]}};});
  const ratio=f.doseIn>0?fmt(f.doseOut/f.doseIn):"—";
  return(<>
    <Hdr title={isEdit?"Editar Shot":"Shot"} sub={`${bean.customName||bean.variety}·${step}/3`} onBack={step===1?onBack:()=>setStep(step-1)}/>
    <div style={st.body}>
      {step===1&&<div style={{paddingTop:16}}>
        <div style={{textAlign:"center",marginBottom:20}}><span style={{...st.label,fontSize:10}}>Parámetros de extracción</span></div>
        <div style={st.row}><div style={st.col}><label style={st.label}>Entrada (g)</label><input type="number" step="0.1" style={st.input} value={f.doseIn} onChange={e=>set("doseIn",parseFloat(e.target.value)||0)}/></div><div style={st.col}><label style={st.label}>Salida (g)</label><input type="number" step="0.1" style={st.input} value={f.doseOut} onChange={e=>set("doseOut",parseFloat(e.target.value)||0)}/></div></div>
        <div style={{textAlign:"center",margin:"6px 0",color:B.gris,fontSize:11}}>Ratio 1:{ratio}</div>
        <div style={{...st.row,marginTop:12}}><div style={st.col}><label style={st.label}>Temp (°C)</label><input type="number" step="0.5" style={st.input} value={f.temp} onChange={e=>set("temp",parseFloat(e.target.value)||0)}/></div><div style={st.col}><label style={st.label}>Tiempo (s)</label><input type="number" style={st.input} value={f.time} onChange={e=>set("time",parseInt(e.target.value)||0)}/></div></div>
        <div style={{marginTop:12}}><label style={{...st.label,color:B.beigeDark}}><span style={{display:"flex",alignItems:"center",gap:6}}><Ic name="grinder" sz={14} c={B.beigeDark}/> Mythos 1 — Molienda</span></label><input type="number" step="0.1" min="0" max="10" style={st.input} value={f.grindSetting} onChange={e=>set("grindSetting",parseFloat(e.target.value)||0)} placeholder="Ej: 3.5"/><div style={{fontSize:10,color:B.gris,marginTop:4}}>Dial micrométrico (0=fino, 10=grueso)</div></div>
        <div style={{...st.row,marginTop:12}}><div style={st.col}><label style={st.label}>Pre-infusión (s)</label><input type="number" style={st.input} value={f.preInfusion} onChange={e=>set("preInfusion",parseInt(e.target.value)||0)}/></div><div style={st.col}><label style={st.label}>Pausa (s)</label><input type="number" style={st.input} value={f.preInfusionPause} onChange={e=>set("preInfusionPause",parseInt(e.target.value)||0)}/></div></div>
        <button style={{...st.btn,marginTop:26}} onClick={()=>setStep(2)}>Siguiente</button>
      </div>}
      {step===2&&<div style={{paddingTop:16}}>
        <div style={{textAlign:"center",marginBottom:20}}><span style={{...st.label,fontSize:10}}>Evaluación sensorial</span></div>
        <label style={{...st.label,color:B.rojo}}>Notas negativas</label>
        <div style={{display:"flex",flexWrap:"wrap",marginBottom:16}}>{FLAVOR_TAGS.negative.map(fl=><Pill key={fl} active={f.flavors.negative.includes(fl)} color="red" onClick={()=>toggleF("negative",fl)}>{fl}</Pill>)}</div>
        <label style={{...st.label,color:"#5DCAA5"}}>Notas positivas</label>
        <div style={{display:"flex",flexWrap:"wrap",marginBottom:16}}>{FLAVOR_TAGS.positive.map(fl=><Pill key={fl} active={f.flavors.positive.includes(fl)} color="green" onClick={()=>toggleF("positive",fl)}>{fl}</Pill>)}</div>
        <label style={st.label}>Calificación</label>
        <Stars value={f.rating} onChange={v=>set("rating",v)}/>
        <div style={{textAlign:"center",fontSize:13,color:B.gris,marginTop:4}}>{f.rating} / 5</div>
        <button style={{...st.btn,marginTop:20}} onClick={()=>setStep(3)}>Siguiente</button>
      </div>}
      {step===3&&<div style={{paddingTop:16}}>
        <div style={{textAlign:"center",marginBottom:20}}><span style={{...st.label,fontSize:10}}>Resumen</span></div>
        <div style={{...st.card,background:B.olivo,borderColor:"transparent"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[{l:"Entrada",v:`${f.doseIn}g`},{l:"Salida",v:`${f.doseOut}g`},{l:"Ratio",v:`1:${ratio}`},{l:"Temp",v:`${f.temp}°C`},{l:"Tiempo",v:`${f.time}s`},{l:"Molienda",v:f.grindSetting>0?`${f.grindSetting}`:"—"}].map(m=>(<div key={m.l}><span style={{fontSize:10,color:B.gris}}>{m.l}</span><div style={{fontSize:15,fontWeight:600}}>{m.v}</div></div>))}
            {f.preInfusion>0&&<div><span style={{fontSize:10,color:B.gris}}>Pre-infusión</span><div style={{fontSize:15,fontWeight:600}}>{f.preInfusion}s/{f.preInfusionPause}s</div></div>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:10}}>
          {f.flavors.positive.map(fl=><span key={fl} style={{...st.tag,...st.tagPosA,fontSize:10}}>{fl}</span>)}
          {f.flavors.negative.map(fl=><span key={fl} style={{...st.tag,...st.tagNegA,fontSize:10}}>{fl}</span>)}
        </div>
        <Stars value={f.rating}/>
        <div style={{textAlign:"center",fontSize:13,color:B.gris}}>{f.rating}/5</div>
        <label style={st.label}>Notas</label>
        <textarea style={{...st.input,minHeight:60,resize:"vertical"}} value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Cambios, observaciones..."/>
        <button style={{...st.btn,marginTop:20}} onClick={()=>onSave(f)}>{isEdit?"Actualizar Shot":"Guardar Shot"}</button>
      </div>}
    </div>
  </>);
}

function Report({bean,onBack}){
  const report=genReport(bean);if(!report)return null;
  const shareReport=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:"mm",format:"a4"});
    const W=210,H=297,M=20,CW=W-2*M;
    const negro=[25,25,25],beige=[226,222,213],rojo=[223,59,58],olivo=[56,58,49],gris=[147,157,165];
    const hex=(c)=>({r:c[0],g:c[1],b:c[2]});
    let y=0;
    /* header bar */
    doc.setFillColor(...negro);doc.rect(0,0,W,52,"F");
    doc.setFontSize(28);doc.setTextColor(...beige);doc.setFont("helvetica","bold");
    doc.text("LOU",M,28);
    doc.setFontSize(9);doc.setTextColor(...gris);doc.setFont("helvetica","normal");
    doc.text("BREW BAR · CALIBRACION",M,36);
    doc.setFontSize(18);doc.setTextColor(...beige);doc.setFont("helvetica","bold");
    doc.text("REPORTE DE LOTE",W-M,28,{align:"right"});
    doc.setFontSize(8);doc.setTextColor(...gris);doc.setFont("helvetica","normal");
    doc.text(new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"}).toUpperCase(),W-M,36,{align:"right"});
    /* red accent line */
    doc.setFillColor(...rojo);doc.rect(0,52,W,2,"F");
    y=64;
    /* bean info section */
    doc.setFontSize(16);doc.setTextColor(...negro);doc.setFont("helvetica","bold");
    doc.text((bean.customName||bean.variety).toUpperCase(),M,y);y+=7;
    if(bean.customName&&bean.variety){doc.setFontSize(10);doc.setTextColor(...gris);doc.setFont("helvetica","normal");doc.text(bean.variety,M,y);y+=5;}
    if(bean.producer){doc.setFontSize(10);doc.setTextColor(...gris);doc.text("Productor: "+bean.producer,M,y);y+=5;}
    y+=3;
    /* info grid */
    doc.setFillColor(245,243,238);doc.roundedRect(M,y,CW,22,3,3,"F");
    const infoY=y+8;const colW=CW/4;
    const infoItems=[{l:"TUESTE",v:bean.roastType},{l:"PROCESO",v:bean.process},{l:"FECHA TUESTE",v:new Date(bean.roastDate).toLocaleDateString("es-MX")},{l:"TOTAL SHOTS",v:String(report.totalShots)}];
    infoItems.forEach((it,i)=>{const x=M+4+i*colW;doc.setFontSize(6);doc.setTextColor(...gris);doc.setFont("helvetica","normal");doc.text(it.l,x,infoY);doc.setFontSize(10);doc.setTextColor(...negro);doc.setFont("helvetica","bold");doc.text(it.v,x,infoY+6);});
    y+=30;
    /* separator */
    doc.setDrawColor(...rojo);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);y+=8;
    /* PROMEDIOS */
    doc.setFontSize(8);doc.setTextColor(...rojo);doc.setFont("helvetica","bold");doc.text("PROMEDIOS",M,y);y+=7;
    doc.setFillColor(...negro);doc.roundedRect(M,y,CW,20,3,3,"F");
    const avgY=y+8;const avgW=CW/6;
    const avgItems=[{l:"TEMP",v:fmt(report.avgTemp)+"°C"},{l:"ENTRADA",v:fmt(report.avgDoseIn)+"g"},{l:"SALIDA",v:fmt(report.avgDoseOut)+"g"},{l:"RATIO",v:"1:"+fmt(report.avgDoseOut/report.avgDoseIn)},{l:"TIEMPO",v:fmt(report.avgTime)+"s"},{l:"MOLIENDA",v:report.avgGrind?String(fmt(report.avgGrind)):"—"}];
    avgItems.forEach((it,i)=>{const x=M+4+i*avgW;doc.setFontSize(5);doc.setTextColor(...gris);doc.setFont("helvetica","normal");doc.text(it.l,x,avgY);doc.setFontSize(11);doc.setTextColor(...beige);doc.setFont("helvetica","bold");doc.text(it.v,x,avgY+7);});
    y+=28;
    /* MEJOR SHOT */
    const bs=report.bestShot;
    if(bs){doc.setFontSize(8);doc.setTextColor(239,159,39);doc.setFont("helvetica","bold");doc.text("MEJOR SHOT",M,y);y+=6;
    doc.setDrawColor(239,159,39);doc.setLineWidth(0.3);doc.roundedRect(M,y,CW,16,3,3,"S");
    doc.setFontSize(11);doc.setTextColor(...negro);doc.setFont("helvetica","bold");
    let shotTxt=`${bs.doseIn}g x ${bs.doseOut}g  ·  ${bs.temp}°C  ·  ${bs.time}s`;
    if(bs.grindSetting)shotTxt+=`  ·  M:${bs.grindSetting}`;if(bs.preInfusion)shotTxt+=`  ·  PI:${bs.preInfusion}/${bs.preInfusionPause}s`;
    doc.text(shotTxt,M+4,y+7);
    doc.setFontSize(10);doc.setTextColor(239,159,39);
    const stars="★".repeat(Math.floor(bs.rating||0))+(bs.rating%1?"½":"")+" "+(bs.rating||0)+"/5";
    doc.text(stars,M+4,y+13);
    y+=24;}
    /* NOTAS POSITIVAS */
    if(report.topPos.length){doc.setFontSize(8);doc.setTextColor(29,158,117);doc.setFont("helvetica","bold");doc.text("NOTAS POSITIVAS FRECUENTES",M,y);y+=6;
    report.topPos.forEach(([fl,c])=>{doc.setFillColor(29,158,117);doc.roundedRect(M,y-3,4,4,1,1,"F");doc.setFontSize(9);doc.setTextColor(...negro);doc.setFont("helvetica","normal");doc.text(`${fl}  (${c}x)`,M+7,y);y+=6;});y+=3;}
    /* NOTAS NEGATIVAS */
    if(report.topNeg.length){doc.setFontSize(8);doc.setTextColor(...rojo);doc.setFont("helvetica","bold");doc.text("NOTAS NEGATIVAS FRECUENTES",M,y);y+=6;
    report.topNeg.forEach(([fl,c])=>{doc.setFillColor(...rojo);doc.roundedRect(M,y-3,4,4,1,1,"F");doc.setFontSize(9);doc.setTextColor(...negro);doc.setFont("helvetica","normal");doc.text(`${fl}  (${c}x)`,M+7,y);y+=6;});y+=3;}
    /* PROGRESION */
    if(bean.shots.length>1){
      doc.setFontSize(8);doc.setTextColor(...gris);doc.setFont("helvetica","bold");doc.text("PROGRESION DE RATING",M,y);y+=6;
      const chartW=CW,chartH=25,barW=Math.min(chartW/bean.shots.length-2,12);
      doc.setFillColor(245,243,238);doc.roundedRect(M,y,chartW,chartH+8,3,3,"F");
      bean.shots.forEach((sh,i)=>{
        const bh=((sh.rating||1)/5)*chartH;const bx=M+4+i*((chartW-8)/bean.shots.length);const by=y+3+chartH-bh;
        const col=(sh.rating||0)>=4?[29,158,117]:(sh.rating||0)>=3?[239,159,39]:rojo;
        doc.setFillColor(...col);doc.roundedRect(bx,by,barW,bh,1,1,"F");
        doc.setFontSize(5);doc.setTextColor(...gris);doc.text("#"+(i+1),bx+barW/2,y+chartH+7,{align:"center"});
      });
      y+=chartH+16;
    }
    /* RECOMENDACIONES PARA TOSTADOR */
    doc.setDrawColor(...rojo);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);y+=8;
    doc.setFontSize(8);doc.setTextColor(...rojo);doc.setFont("helvetica","bold");doc.text("RECOMENDACIONES PARA TOSTADOR",M,y);y+=7;
    doc.setFontSize(9);doc.setTextColor(...negro);doc.setFont("helvetica","normal");
    if(report.topNeg.some(([fl])=>fl==="Agrio"||fl==="Vegetal")){doc.text("•  Considerar mayor desarrollo del tueste para reducir notas acidas/vegetales.",M,y);y+=6;}
    if(report.topNeg.some(([fl])=>fl==="Amargo"||fl==="Quemado"||fl==="Ceniza")){doc.text("•  El grano podria beneficiarse de un tueste ligeramente mas claro.",M,y);y+=6;}
    if(report.topPos.some(([fl])=>fl==="Balanceado"||fl==="Dulce")){doc.text("•  Perfil logrado: buen balance en taza. Mantener perfil de tueste.",M,y);y+=6;}
    if(!report.topNeg.length&&!report.topPos.some(([fl])=>fl==="Balanceado")){doc.text("•  Ajuste fino: continuar calibracion para definir perfil optimo.",M,y);y+=6;}
    /* HISTORIAL DE SHOTS */
    y+=6;
    if(y<H-60){
      doc.setFontSize(8);doc.setTextColor(...gris);doc.setFont("helvetica","bold");doc.text("HISTORIAL COMPLETO",M,y);y+=5;
      doc.setFontSize(6);doc.setTextColor(...gris);doc.setFont("helvetica","normal");
      const hdr=["#","FECHA","IN","OUT","TEMP","TIME","GRIND","PI","RATING"];
      const colWidths=[8,22,14,14,14,14,16,20,18];
      let hx=M;hdr.forEach((h,i)=>{doc.text(h,hx,y);hx+=colWidths[i];});y+=4;
      doc.setDrawColor(220,218,210);doc.line(M,y-1,W-M,y-1);
      doc.setTextColor(...negro);
      bean.shots.forEach((sh,i)=>{
        if(y>H-15){doc.addPage();y=20;}
        let hx2=M;
        const vals=[String(i+1),new Date(sh.timestamp).toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit"}),sh.doseIn+"g",sh.doseOut+"g",sh.temp+"°",sh.time+"s",sh.grindSetting?String(sh.grindSetting):"—",sh.preInfusion?sh.preInfusion+"/"+sh.preInfusionPause+"s":"—",String(sh.rating||"—")];
        vals.forEach((v,vi)=>{doc.text(v,hx2,y);hx2+=colWidths[vi];});y+=4;
      });
    }
    /* footer */
    const lastPage=doc.internal.getNumberOfPages();
    for(let p=1;p<=lastPage;p++){doc.setPage(p);doc.setFillColor(...olivo);doc.rect(0,H-10,W,10,"F");doc.setFontSize(7);doc.setTextColor(...beige);doc.setFont("helvetica","normal");doc.text("LOU BREW BAR  ·  Sombrerete 522, Col. Condesa, CDMX  ·  @loubrewbar",W/2,H-4,{align:"center"});}
    /* save/share */
    const fileName=`LOU_Reporte_${(bean.customName||bean.variety).replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`;
    const pdfBlob=doc.output("blob");
    if(navigator.share&&navigator.canShare){
      const file=new File([pdfBlob],fileName,{type:"application/pdf"});
      if(navigator.canShare({files:[file]})){navigator.share({title:`Reporte: ${bean.customName||bean.variety}`,files:[file]});return;}
    }
    doc.save(fileName);
  };
  return(<>
    <Hdr title="Reporte" onBack={onBack} right={<button onClick={shareReport} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Ic name="share"/></button>}/>
    <div style={st.body}>
      <div style={{textAlign:"center",paddingTop:20}}><img src={LOGO} alt="LOU" style={{height:32,opacity:.7}}/><div style={{...st.mon,fontSize:20,marginTop:10}}>Reporte de Lote</div><div style={{fontSize:11,color:B.gris,marginTop:4,letterSpacing:2}}>{bean.customName||bean.variety}</div>{bean.producer&&<div style={{fontSize:10,color:B.gris,marginTop:2}}>{bean.producer}</div>}</div>
      <div style={{...st.card,background:B.olivo,borderColor:"transparent",marginTop:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><span style={{fontSize:10,color:B.gris}}>Tueste</span><div style={{fontSize:13,fontWeight:600}}>{bean.roastType}</div></div>
          <div><span style={{fontSize:10,color:B.gris}}>Proceso</span><div style={{fontSize:13,fontWeight:600}}>{bean.process}</div></div>
          <div><span style={{fontSize:10,color:B.gris}}>Fecha</span><div style={{fontSize:13,fontWeight:600}}>{new Date(bean.roastDate).toLocaleDateString("es-MX")}</div></div>
          <div><span style={{fontSize:10,color:B.gris}}>Shots</span><div style={{fontSize:13,fontWeight:600}}>{report.totalShots}</div></div>
        </div>
      </div>
      <div style={{marginTop:16}}><span style={{...st.label,fontSize:10}}>Promedios</span>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:6}}>
          {[{v:`${fmt(report.avgTemp)}°`,l:"Temp"},{v:`${fmt(report.avgDoseIn)}g`,l:"In"},{v:`${fmt(report.avgDoseOut)}g`,l:"Out"},{v:`1:${fmt(report.avgDoseOut/report.avgDoseIn)}`,l:"Ratio"},{v:`${fmt(report.avgTime)}s`,l:"Time"},{v:report.avgGrind?fmt(report.avgGrind):"—",l:"Grind"}].map(m=>(<div key={m.l} style={st.metric}><div style={{...st.mVal,fontSize:16}}>{m.v}</div><div style={st.mLab}>{m.l}</div></div>))}
        </div>
      </div>
      {report.bestShot&&<div style={{marginTop:16}}>
        <span style={{...st.label,fontSize:10,color:"#EF9F27"}}>Mejor Shot</span>
        <div style={{...st.card,borderColor:"#EF9F27",marginTop:6}}>
          <div style={{fontSize:14,fontWeight:600}}>{report.bestShot.doseIn}g×{report.bestShot.doseOut}g·{report.bestShot.temp}°C·{report.bestShot.time}s{report.bestShot.grindSetting>0&&` M:${report.bestShot.grindSetting}`}{report.bestShot.preInfusion>0&&` PI:${report.bestShot.preInfusion}/${report.bestShot.preInfusionPause}s`}</div>
          <Stars value={report.bestShot.rating||0} sz={18}/>
          <div style={{textAlign:"center",fontSize:11,color:B.gris}}>{report.bestShot.rating}/5</div>
        </div>
      </div>}
      <div style={{marginTop:16}}><span style={{...st.label,fontSize:10,color:"#5DCAA5"}}>Positivas frecuentes</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{!report.topPos.length?<span style={{fontSize:11,color:B.gris}}>—</span>:report.topPos.map(([f,c])=><span key={f} style={{...st.tag,...st.tagPosA,fontSize:11}}>{f}({c})</span>)}</div>
      </div>
      <div style={{marginTop:14}}><span style={{...st.label,fontSize:10,color:B.rojo}}>Negativas frecuentes</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{!report.topNeg.length?<span style={{fontSize:11,color:B.gris}}>—</span>:report.topNeg.map(([f,c])=><span key={f} style={{...st.tag,...st.tagNegA,fontSize:11}}>{f}({c})</span>)}</div>
      </div>
      <div style={{marginTop:20}}><span style={{...st.label,fontSize:10}}>Progresión</span>
        <div style={{marginTop:6,height:70,display:"flex",alignItems:"flex-end",gap:3}}>
          {bean.shots.map((sh,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",maxWidth:28,height:`${((sh.rating||1)/5)*50}px`,background:(sh.rating||0)>=4?"#1D9E75":(sh.rating||0)>=3?"#EF9F27":B.rojo,borderRadius:3}}/><span style={{fontSize:8,color:B.gris}}>#{i+1}</span></div>))}
        </div>
      </div>
      <button onClick={shareReport} style={{...st.btn,marginTop:24,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Ic name="share" sz={16} c="#fff"/> Descargar PDF</button>
      <div style={{height:30}}/>
    </div>
  </>);
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
